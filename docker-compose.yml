services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: "0.1.0-local"
        BUILD_TIMESTAMP: "local"
        GIT_COMMIT_SHA: "local"
    image: docker-ci-pipeline:local
    container_name: docker-ci-pipeline
    ports:
      - "5000:5000"
    environment:
      APP_ENV: local
      APP_VERSION: "0.1.0-local"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
