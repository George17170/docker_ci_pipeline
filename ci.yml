name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: docker-ci-pipeline
  PYTHON_VERSION: "3.11"

jobs:

  # Job 1: Test + Lint
  # Runs on every push and PR.
  # Fails fast — no point building an image if
  # tests or lint are broken.

  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 app/ tests/

      - name: Run tests with coverage
        run: pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # Job 2: Build & Push Docker image
  # Only runs on pushes to main (not PRs).
  # Depends on test job passing first.

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="0.1.${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            BUILD_TIMESTAMP=${{ steps.meta.outputs.timestamp }}
            GIT_COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize build
        run: |
          echo "### Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY

  # Job 3: Smoke test the pushed image
  # Pulls the image we just pushed and hits
  # the /health endpoint to confirm it runs.

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Pull and run image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker run -d \
            --name smoke-test \
            -p 5000:5000 \
            -e APP_ENV=staging \
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for app to start..."
          for i in {1..15}; do
            if curl -sf http://localhost:5000/health > /dev/null; then
              echo "App is healthy after ${i} attempts"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 2s..."
            sleep 2
          done
          echo "App failed to become healthy"
          docker logs smoke-test
          exit 1

      - name: Verify all endpoints
        run: |
          echo "Testing / ..."
          curl -sf http://localhost:5000/ | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'ok', f'Expected ok, got {data[\"status\"]}'
          print('  / OK')
          "

          echo "Testing /health ..."
          curl -sf http://localhost:5000/health | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'healthy', f'Expected healthy, got {data[\"status\"]}'
          assert data['uptime_seconds'] >= 0, 'Uptime should be non-negative'
          print('  /health OK')
          "

          echo "Testing /pipeline ..."
          curl -sf http://localhost:5000/pipeline | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'build' in data, 'Missing build info'
          assert 'image' in data, 'Missing image info'
          print('  /pipeline OK')
          "

      - name: Print container logs on failure
        if: failure()
        run: docker logs smoke-test

      - name: Stop container
        if: always()
        run: docker rm -f smoke-test || true